{% extends "base.html" %}
{% block title %}Edit Ad – AdVance{% endblock %}

{% block content %}

<section class="page-header">
  <div class="container">
    <h1 class="page-title">Edit Ad</h1>
    <p class="page-sub">Update your ad details below</p>
  </div>
</section>

<section class="section">
  <div class="container container-narrow">
    <form class="ad-form" method="POST" action="{{ url_for('edit_ad', ad_id=ad._id) }}">

      <div class="form-group">
        <label for="title" class="form-label">Ad Title <span class="required">*</span></label>
        <input type="text" id="title" name="title" class="form-control"
               value="{{ ad.title }}" maxlength="100" required/>
      </div>

      <div class="form-group">
        <label for="description" class="form-label">Description</label>
        <textarea id="description" name="description" class="form-control" rows="4"
                  maxlength="500">{{ ad.description }}</textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="category" class="form-label">Category</label>
          <select id="category" name="category" class="form-control">
            {% for cat in categories %}
              <option value="{{ cat }}" {% if ad.category == cat %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label for="external_link" class="form-label">External Link <span class="required">*</span></label>
          <input type="url" id="external_link" name="external_link" class="form-control"
                 value="{{ ad.external_link }}" required/>
        </div>
      </div>

      <div class="form-group">
        <label for="image_url" class="form-label">Image URL</label>
        <input type="url" id="image_url" name="image_url" class="form-control"
               value="{{ ad.image_url }}" placeholder="https://example.com/image.jpg"/>
      </div>

      <div class="form-submit">
        <button type="submit" class="btn btn-primary btn-lg">Save Changes</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-ghost btn-lg">Cancel</a>
      </div>

    </form>
  </div>
</section>

{% endblock %}
